name: Tests

on:
  pull_request:

jobs:
  detect:
    name: Detect affected
    runs-on: ubuntu-latest
    outputs:
      # JSON object keyed by task, e.g. {"test:unit":["backend"],"test:e2e":["backend"]}.
      # Each test type reads its own key, so a matrix built from [] simply spawns no
      # jobs — no shared "any" flag deciding for every test type at once.
      tasks: ${{ steps.affected.outputs.tasks }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Need the base commit present to diff the PR against it.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Compute affected packages per test task
        id: affected
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          tasks=$(bun scripts/affected-packages.ts "$BASE_SHA" test:unit test:e2e)
          echo "tasks=$tasks" >> "$GITHUB_OUTPUT"

  e2e:
    name: E2E tests ${{ matrix.package }}
    needs: detect
    # The DB-backed suite runs only on PRs targeting the deployable branches.
    if: github.base_ref == 'main' || github.base_ref == 'staging'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.detect.outputs.tasks)['test:e2e'] }}
    # Dedicated test-deploy database, separate from production. Safe to reuse across
    # runs: setup.ts `prisma db push --force-reset` wipes it clean at the start of
    # every run, so no state leaks between PRs.
    env:
      DATABASE_URL: ${{ secrets.DATABASE_TEST_URL }}
      DATABASE_TEST_URL: ${{ secrets.DATABASE_TEST_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # No Turbo cache here: test:e2e hits the remote test DB, so a cache hit
      # would skip a run that must actually execute against external state.
      - name: Install dependencies
        run: bun i --frozen-lockfile

      - name: Run E2E tests (${{ matrix.package }})
        run: bun turbo run test:e2e -F ${{ matrix.package }} --cache-dir=.turbo --force

  unit:
    name: Unit tests ${{ matrix.package }}
    needs: detect
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.detect.outputs.tasks)['test:unit'] }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-test-unit-${{ matrix.package }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-test-unit-${{ matrix.package }}-

      - name: Install dependencies
        run: bun i --frozen-lockfile

      - name: Run unit tests (${{ matrix.package }})
        run: bun turbo run test:unit -F ${{ matrix.package }} --cache-dir=.turbo
