name: Build and Publish to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  detect:
    name: Detect affected
    runs-on: ubuntu-latest
    outputs:
      # {"build":["backend",...]} — deployable services whose Docker image must be
      # rebuilt. A matrix built from [] spawns no jobs, so an unaffected push is
      # skipped without emitting a new image.
      tasks: ${{ steps.affected.outputs.tasks }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun i --frozen-lockfile

      - name: Compute affected deployable services
        id: affected
        env:
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
        run: |
          # Services that ship a Docker image. Each must have a matrix entry below.
          deployable='["backend","frontend"]'
          # Ask Turbo what its `build` task would actually run. On push it uses its
          # input/dependency-graph + lockfile hashing vs the previous commit, so a
          # service is affected only when its own src, a workspace dependency, or the
          # lockfile changed — unchanged services emit no image. A manual dispatch (or
          # a missing/zero base ref, e.g. a branch's first push) plans every service.
          if [[ "$EVENT" == "workflow_dispatch" || -z "$BEFORE" || "$BEFORE" =~ ^0+$ ]]; then
            dry=$(bun turbo run build --dry-run=json)
          else
            dry=$(TURBO_SCM_BASE="$BEFORE" bun turbo run build --affected --dry-run=json)
          fi
          # Keep packages that genuinely run `build` (skip <NONEXISTENT> dep tasks),
          # then intersect with the deployable set.
          affected=$(jq -c --argjson deploy "$deployable" \
            '[.tasks[] | select(.task == "build" and .command != "<NONEXISTENT>") | .package]
             | unique | map(select(. as $p | $deploy | index($p)))' <<<"$dry")
          echo "tasks={\"build\":$affected}" >> "$GITHUB_OUTPUT"

  build_publish:
    name: Build and publish ${{ matrix.service }} image
    needs: detect
    if: ${{ fromJSON(needs.detect.outputs.tasks).build[0] }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect.outputs.tasks).build }}
        include:
          - service: backend
            dockerfile: backend/Dockerfile
            build_args: |
              NODE_ENV=production
          - service: frontend
            dockerfile: frontend/Dockerfile
            build_args: |
              NODE_ENV=production
              VITE_API_URL=${{ vars.VITE_API_URL }}
              VITE_APP_URL=${{ vars.VITE_APP_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}_${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value={{date 'YYYYMMDD'}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          secrets: ${{ matrix.service == 'backend' && format('DATABASE_URL={0}', secrets.DATABASE_URL) || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
